<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#04140c">
<title>ARACHNID_SENTRY :: phosphor web</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg: #06110b;
    --phosphor: #3dffa0;
    --phosphor-dim: #1c8f5c;
    --phosphor-faint: rgba(61,255,160,0.22);
    --cyan: #5be9ff;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--phosphor);
  }

  .rig{
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
    padding: 32px 16px;
    width: min(94vw, 720px);
  }

  .monitor{
    background: linear-gradient(180deg, #1d1e20, #131415);
    border-radius: 22px;
    padding: 20px 20px 26px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7), inset 0 0 0 1px #303234;
  }

  .screen{
    position: relative;
    aspect-ratio: 640 / 380;
    background: radial-gradient(120% 140% at 50% 18%, #072016 0%, #03100a 58%, #020a06 100%);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 0 46px rgba(0,0,0,0.85), inset 0 0 2px rgba(61,255,160,0.35);
  }

  .scanlines{
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      rgba(0,0,0,0.35) 2px,
      rgba(0,0,0,0) 3px
    );
    mix-blend-mode: multiply;
    opacity: 0.55;
  }

  .flicker{
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: rgba(61,255,160,0.03);
    animation: flicker 6.4s infinite steps(40);
  }

  @keyframes flicker{
    0%, 100%{ opacity: 0; }
    2%{ opacity: 0.4; }
    3%{ opacity: 0; }
    41%{ opacity: 0; }
    42%{ opacity: 0.22; }
    43%{ opacity: 0; }
  }

  .crt-label{
    position: absolute;
    top: 10px;
    left: 14px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--phosphor-dim);
    pointer-events: none;
    opacity: 0.85;
  }

  svg#stage{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
  }

  .strand{ stroke: var(--phosphor-faint); stroke-width: 0.6; fill: none; }
  .spoke{ animation: shimmer 5.5s ease-in-out infinite; }
  .spoke:nth-child(3n){ animation-delay: -1.7s; }
  .spoke:nth-child(3n+1){ animation-delay: -3.2s; }

  @keyframes shimmer{
    0%, 100%{ opacity: 0.55; }
    50%{ opacity: 0.95; }
  }

  .trigger-line{ stroke: var(--phosphor-dim); stroke-width: 0.8; fill: none; }
  .den{ fill: rgba(28,143,92,0.16); stroke: var(--phosphor-dim); stroke-width: 0.7; stroke-dasharray: 2 2; }

  #spider{ transition: opacity 0.4s ease; }
  #spider.hidden{ opacity: 0.28; }
  #spider.alert .leg{ stroke: var(--cyan); }
  #spider.alert .eye{ fill: var(--cyan); }

  .leg{ stroke: var(--phosphor-dim); stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; fill: none; transition: stroke 0.25s ease; }
  .abdomen, .cephalothorax{ fill: #0a2417; stroke: var(--phosphor-dim); stroke-width: 1; }
  .eye{ fill: var(--phosphor-dim); transition: fill 0.25s ease; }
  .spinneret{ stroke: var(--phosphor-dim); stroke-width: 1.4; stroke-linecap: round; }

  .wrap-pulse{ fill: none; stroke: var(--cyan); stroke-width: 1.4; stroke-dasharray: 3 3; animation: wrapPulse 0.7s ease-out forwards; }
  @keyframes wrapPulse{ from{ r: 2; opacity: 0.9; } to{ r: 26; opacity: 0; } }

  .hud{
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--phosphor-dim);
    padding: 0 2px;
  }
  .hud .dot{ width: 6px; height: 6px; border-radius: 50%; background: var(--phosphor-dim); display: inline-block; margin-right: 7px; box-shadow: 0 0 6px var(--phosphor-dim); }
  .hud .dot.live{ background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
  .hud b{ color: var(--phosphor); font-weight: 700; }

  .hint{
    font-size: 10px;
    text-align: center;
    color: var(--phosphor-dim);
    opacity: 0.75;
    letter-spacing: 0.03em;
  }

  @media (prefers-reduced-motion: reduce){
    .flicker, .spoke{ animation: none !important; }
  }
</style>
</head>
<body>

<div class="rig">
  <div class="monitor">
    <div class="screen">
      <svg id="stage" viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg"
           aria-label="Interactive phosphor-green spider living on its web. It senses cursor movement and hunts toward clicks.">
        <g id="web-layer"></g>
        <g id="spider">
          <g id="legs"></g>
          <g id="body-anchor">
            <line class="spinneret" x1="-20" y1="-3" x2="-27" y2="-7"></line>
            <line class="spinneret" x1="-20" y1="3" x2="-27" y2="7"></line>
            <g id="abdomen-scale">
              <ellipse class="abdomen" cx="-10" cy="0" rx="13" ry="10"></ellipse>
            </g>
            <ellipse class="cephalothorax" cx="7" cy="0" rx="8" ry="6.4"></ellipse>
            <circle class="eye" cx="12.5" cy="-2.4" r="1"></circle>
            <circle class="eye" cx="12.5" cy="2.4" r="1"></circle>
            <circle class="eye" cx="14" cy="-4.6" r="0.8"></circle>
            <circle class="eye" cx="14" cy="4.6" r="0.8"></circle>
          </g>
        </g>
        <g id="fx-layer"></g>
      </svg>
      <div class="scanlines"></div>
      <div class="flicker"></div>
      <div class="crt-label">ARACHNID_SENTRY v1.0</div>
    </div>
  </div>

  <div class="hud">
    <span><span class="dot" id="hud-dot"></span>STATE: <b id="hud-state">DORMANT</b></span>
    <span id="hud-clock">00:00:00</span>
  </div>
  <div class="hint">move the cursor near the web to wake it &middot; click anywhere to lure prey</div>
</div>

<script>
(function(){
  var NS = 'http://www.w3.org/2000/svg';

  function svgEl(tag, attrs){
    var el = document.createElementNS(NS, tag);
    for(var k in attrs){ el.setAttribute(k, attrs[k]); }
    return el;
  }

  function rotate(px, py, rad){
    var c = Math.cos(rad), s = Math.sin(rad);
    return { x: px*c - py*s, y: px*s + py*c };
  }

  function angleDiff(target, current){
    var d = target - current;
    while(d > Math.PI){ d -= Math.PI*2; }
    while(d < -Math.PI){ d += Math.PI*2; }
    return d;
  }

  function easeInOut(t){
    return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2;
  }

  function randRange(min, max){
    return min + Math.random()*(max-min);
  }

  function ikKnee(hip, foot, l1, l2, side){
    var dx = foot.x - hip.x, dy = foot.y - hip.y;
    var d = Math.hypot(dx, dy);
    d = Math.min(Math.max(d, 0.01), l1 + l2 - 0.5);
    var a = (l1*l1 - l2*l2 + d*d) / (2*d);
    var h = Math.sqrt(Math.max(0, l1*l1 - a*a));
    var ux = dx/d, uy = dy/d;
    var mx = hip.x + ux*a, my = hip.y + uy*a;
    var px = -uy*h*side, py = ux*h*side;
    return { x: mx + px, y: my + py };
  }

  // --- world constants ---
  var HUB = { x: 260, y: 190 };
  var DEN = { x: 566, y: 50 };
  var L1 = 28, L2 = 30;
  var SENSE_RADIUS = 300;
  var WALK_SPEED_NORMAL = 110;
  var WALK_SPEED_STRIKE = 150;
  var PATROL_MIN = 6000, PATROL_MAX = 12000;
  var REST_MIN = 24000, REST_MAX = 38000;
  var RETREAT_HOLD = 2400;
  var WRAP_HOLD = 550;

  var REDUCE_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // one side of the leg layout; the other side is mirrored at build time
  var BASE_LEGS = [
    { hx: 9,  hy: 6, fx: 46, fy: 46 },
    { hx: 3,  hy: 7, fx: 50, fy: 16 },
    { hx: -3, hy: 7, fx: 34, fy: -14 },
    { hx: -9, hy: 6, fx: 8,  fy: -46 }
  ];
  var LEG_DEFS = [];
  BASE_LEGS.forEach(function(l){
    LEG_DEFS.push({ side: 1,  hx: l.hx, hy: l.hy,  fx: l.fx, fy: l.fy });
    LEG_DEFS.push({ side: -1, hx: l.hx, hy: -l.hy, fx: l.fx, fy: -l.fy });
  });

  function hipWorld(def, body){
    var r = rotate(def.hx, def.hy, body.angle);
    return { x: body.x + r.x, y: body.y + r.y };
  }
  function idealFoot(def, body){
    var r = rotate(def.fx, def.fy, body.angle);
    return { x: body.x + r.x, y: body.y + r.y };
  }

  // --- element refs ---
  var stage = document.getElementById('stage');
  var webLayer = document.getElementById('web-layer');
  var legsGroup = document.getElementById('legs');
  var bodyAnchor = document.getElementById('body-anchor');
  var abdomenScale = document.getElementById('abdomen-scale');
  var fxLayer = document.getElementById('fx-layer');
  var spiderEl = document.getElementById('spider');
  var hudState = document.getElementById('hud-state');
  var hudDot = document.getElementById('hud-dot');
  var hudClock = document.getElementById('hud-clock');

  // --- state ---
  var body = { x: HUB.x, y: HUB.y, angle: 0 };
  var mouse = { x: HUB.x, y: HUB.y, inside: false };
  var phase = 'idle';
  var walking = false, walkTarget = null, walkSpeed = 0, walkOnArrive = null;
  var anchors = [];
  var legs = [];
  var patrolTimeout = null, restTimeout = null;

  function setHud(label){
    hudState.textContent = label;
    hudDot.classList.toggle('live', label !== 'DORMANT');
  }

  function buildWeb(){
    var count = 9;
    var rx = 210, ry = 150;
    var startAngle = -Math.PI/2 + 0.15;
    for(var i=0; i<count; i++){
      var a = startAngle + (Math.PI*2/count)*i;
      anchors.push({ x: HUB.x + Math.cos(a)*rx, y: HUB.y + Math.sin(a)*ry });
    }
    anchors.forEach(function(pt){
      webLayer.appendChild(svgEl('line', {
        x1: HUB.x, y1: HUB.y, x2: pt.x.toFixed(1), y2: pt.y.toFixed(1),
        class: 'strand spoke'
      }));
    });
    [0.34, 0.6, 0.84].forEach(function(f){
      var pts = anchors.map(function(pt){
        var x = HUB.x + (pt.x-HUB.x)*f;
        var y = HUB.y + (pt.y-HUB.y)*f;
        return x.toFixed(1) + ',' + y.toFixed(1);
      });
      pts.push(pts[0]);
      webLayer.appendChild(svgEl('polyline', { points: pts.join(' '), class: 'strand spoke' }));
    });
    webLayer.appendChild(svgEl('line', {
      x1: HUB.x, y1: HUB.y, x2: DEN.x, y2: DEN.y, class: 'trigger-line'
    }));
    webLayer.appendChild(svgEl('path', {
      d: 'M ' + (DEN.x-17) + ' ' + (DEN.y-5) +
         ' Q ' + (DEN.x-5) + ' ' + (DEN.y-23) + ' ' + (DEN.x+15) + ' ' + (DEN.y-9) +
         ' Q ' + (DEN.x+23) + ' ' + (DEN.y+9) + ' ' + (DEN.x+5) + ' ' + (DEN.y+17) +
         ' Q ' + (DEN.x-11) + ' ' + (DEN.y+19) + ' ' + (DEN.x-17) + ' ' + (DEN.y-5) + ' Z',
      class: 'den'
    }));
  }

  function buildLegs(){
    legs = LEG_DEFS.map(function(def){
      var el = svgEl('polyline', { class: 'leg', points: '' });
      legsGroup.appendChild(el);
      return {
        def: def,
        el: el,
        foot: idealFoot(def, body),
        stepping: false, stepFrom: null, stepTo: null, stepT: 0,
        threshold: 8 + Math.random()*6,
        duration: 150 + Math.random()*90
      };
    });
  }

  function updateLeg(leg, dt){
    var ideal = idealFoot(leg.def, body);
    if(!leg.stepping){
      var dist = Math.hypot(ideal.x-leg.foot.x, ideal.y-leg.foot.y);
      if(dist > leg.threshold){
        leg.stepping = true;
        leg.stepFrom = { x: leg.foot.x, y: leg.foot.y };
        leg.stepTo = ideal;
        leg.stepT = 0;
      }
    } else {
      leg.stepT += dt / leg.duration;
      if(leg.stepT >= 1){
        leg.foot = { x: leg.stepTo.x, y: leg.stepTo.y };
        leg.stepping = false;
      } else {
        var e = easeInOut(leg.stepT);
        leg.foot = {
          x: leg.stepFrom.x + (leg.stepTo.x-leg.stepFrom.x)*e,
          y: leg.stepFrom.y + (leg.stepTo.y-leg.stepFrom.y)*e
        };
      }
    }
  }

  function toSvgPoint(evt){
    var pt = stage.createSVGPoint();
    pt.x = evt.clientX; pt.y = evt.clientY;
    var ctm = stage.getScreenCTM();
    if(!ctm){ return { x: HUB.x, y: HUB.y }; }
    var sp = pt.matrixTransform(ctm.inverse());
    return { x: sp.x, y: sp.y };
  }

  function stepWalk(dt, speed){
    var dx = walkTarget.x-body.x, dy = walkTarget.y-body.y;
    var dist = Math.hypot(dx, dy);
    var moveAmt = speed*dt/1000;
    if(dist <= moveAmt || dist < 0.5){
      body.x = walkTarget.x; body.y = walkTarget.y;
      return true;
    }
    body.x += dx/dist*moveAmt;
    body.y += dy/dist*moveAmt;
    return false;
  }

  function walkTo(target, speed, onArrive){
    walking = true;
    walkTarget = target;
    walkSpeed = speed;
    walkOnArrive = onArrive;
  }

  function spawnWrapPulse(pt){
    var c = svgEl('circle', { cx: pt.x, cy: pt.y, r: 3, class: 'wrap-pulse' });
    fxLayer.appendChild(c);
    setTimeout(function(){ c.remove(); }, 700);
  }

  function scheduleAutonomous(){
    clearTimeout(patrolTimeout); clearTimeout(restTimeout);
    if(REDUCE_MOTION){ return; }
    patrolTimeout = setTimeout(doPatrol, randRange(PATROL_MIN, PATROL_MAX));
    restTimeout = setTimeout(doRest, randRange(REST_MIN, REST_MAX));
  }

  function doPatrol(){
    if(phase !== 'idle'){ return; }
    phase = 'patrol'; setHud('PATROLLING');
    var a = anchors[Math.floor(Math.random()*anchors.length)];
    var waypoint = { x: HUB.x+(a.x-HUB.x)*0.55, y: HUB.y+(a.y-HUB.y)*0.55 };
    walkTo(waypoint, WALK_SPEED_NORMAL, function(){
      walkTo(HUB, WALK_SPEED_NORMAL, function(){
        phase = 'idle'; setHud('DORMANT');
        scheduleAutonomous();
      });
    });
  }

  function doRest(){
    if(phase !== 'idle'){ return; }
    phase = 'rest'; setHud('RETREATING');
    walkTo(DEN, WALK_SPEED_NORMAL, function(){
      setHud('RESTING');
      spiderEl.classList.add('hidden');
      setTimeout(function(){
        spiderEl.classList.remove('hidden');
        walkTo(HUB, WALK_SPEED_NORMAL, function(){
          phase = 'idle'; setHud('DORMANT');
          scheduleAutonomous();
        });
      }, RETREAT_HOLD);
    });
  }

  function triggerStrike(point){
    if(walking || (phase !== 'idle' && phase !== 'alert')){ return; }
    phase = 'hunting'; setHud('HUNTING');
    spiderEl.classList.add('alert');
    clearTimeout(patrolTimeout); clearTimeout(restTimeout);
    walkTo(point, WALK_SPEED_STRIKE, function(){
      spawnWrapPulse(point);
      setTimeout(function(){
        walkTo(HUB, WALK_SPEED_NORMAL, function(){
          phase = 'idle'; setHud('DORMANT');
          spiderEl.classList.remove('alert');
          scheduleAutonomous();
        });
      }, WRAP_HOLD);
    });
  }

  function update(dt){
    if(!walking && (phase === 'idle' || phase === 'alert')){
      var d = Math.hypot(mouse.x-body.x, mouse.y-body.y);
      if(mouse.inside && d < SENSE_RADIUS){
        if(phase !== 'alert'){
          phase = 'alert'; setHud('SENSING');
          spiderEl.classList.add('alert');
          clearTimeout(patrolTimeout); clearTimeout(restTimeout);
        }
      } else if(phase === 'alert'){
        phase = 'idle'; setHud('DORMANT');
        spiderEl.classList.remove('alert');
        scheduleAutonomous();
      }
    }

    if(walking){
      var desired = Math.atan2(walkTarget.y-body.y, walkTarget.x-body.x);
      body.angle += angleDiff(desired, body.angle)*Math.min(1, dt/120);
      var arrived = stepWalk(dt, walkSpeed);
      if(arrived){
        walking = false;
        var cb = walkOnArrive; walkOnArrive = null;
        if(cb){ cb(); }
      }
    } else {
      var target = phase === 'alert' ? Math.atan2(mouse.y-body.y, mouse.x-body.x) : 0;
      body.angle += angleDiff(target, body.angle)*Math.min(1, dt/220);
    }

    legs.forEach(function(l){ updateLeg(l, dt); });
  }

  function render(){
    legs.forEach(function(l){
      var hip = hipWorld(l.def, body);
      var knee = ikKnee(hip, l.foot, L1, L2, l.def.side);
      l.el.setAttribute('points',
        hip.x.toFixed(1) + ',' + hip.y.toFixed(1) + ' ' +
        knee.x.toFixed(1) + ',' + knee.y.toFixed(1) + ' ' +
        l.foot.x.toFixed(1) + ',' + l.foot.y.toFixed(1)
      );
    });
    bodyAnchor.setAttribute('transform',
      'translate(' + body.x.toFixed(1) + ',' + body.y.toFixed(1) + ') rotate(' + (body.angle*180/Math.PI).toFixed(1) + ')'
    );
    var breathe = walking ? 1 : 1 + Math.sin(performance.now()/900)*0.035;
    abdomenScale.setAttribute('transform', 'translate(-10,0) scale(' + breathe.toFixed(3) + ') translate(10,0)');
  }

  function pad(n){ return String(n).padStart(2, '0'); }
  function updateClock(){
    var d = new Date();
    hudClock.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  stage.addEventListener('mousemove', function(e){
    var p = toSvgPoint(e);
    mouse.x = p.x; mouse.y = p.y; mouse.inside = true;
  });
  stage.addEventListener('mouseleave', function(){ mouse.inside = false; });
  stage.addEventListener('click', function(e){
    triggerStrike(toSvgPoint(e));
  });
  stage.addEventListener('touchstart', function(e){
    if(e.touches && e.touches[0]){
      var t = e.touches[0];
      var p = toSvgPoint({ clientX: t.clientX, clientY: t.clientY });
      mouse.x = p.x; mouse.y = p.y; mouse.inside = true;
      triggerStrike(p);
    }
  }, { passive: true });

  var lastTime = performance.now();
  function frame(now){
    var dt = Math.min(64, now-lastTime);
    lastTime = now;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }

  function init(){
    buildWeb();
    buildLegs();
    updateClock();
    setInterval(updateClock, 1000);
    update(0);
    render();
    requestAnimationFrame(frame);
    scheduleAutonomous();
  }

  init();
})();
</script>

</body>
</html>
